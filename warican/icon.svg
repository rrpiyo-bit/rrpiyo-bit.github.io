<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="64" height="64" fill="#0a0a1e"/>

  <!-- Coin body (gold) -->
  <rect x="16" y="4"  width="32" height="4"  fill="#ffd700"/>
  <rect x="8"  y="8"  width="48" height="4"  fill="#ffd700"/>
  <rect x="4"  y="12" width="56" height="40" fill="#ffd700"/>
  <rect x="8"  y="52" width="48" height="4"  fill="#ffd700"/>
  <rect x="16" y="56" width="32" height="4"  fill="#ffd700"/>

  <!-- Coin highlight (top-left) -->
  <rect x="20" y="4"  width="16" height="4"  fill="#ffe44d"/>
  <rect x="8"  y="8"  width="8"  height="4"  fill="#ffe44d"/>
  <rect x="4"  y="12" width="8"  height="6"  fill="#ffe44d"/>

  <!-- Coin shadow (bottom-right) -->
  <rect x="52" y="48" width="8"  height="4"  fill="#c8a800"/>
  <rect x="8"  y="52" width="8"  height="4"  fill="#c8a800"/>

  <!-- ¥ symbol (dark gold) -->
  <!-- Legs of Y -->
  <rect x="20" y="16" width="8"  height="4"  fill="#7a5c00"/>
  <rect x="36" y="16" width="8"  height="4"  fill="#7a5c00"/>
  <rect x="24" y="20" width="8"  height="4"  fill="#7a5c00"/>
  <rect x="32" y="20" width="4"  height="4"  fill="#7a5c00"/>
  <!-- Stem of Y -->
  <rect x="28" y="24" width="8"  height="4"  fill="#7a5c00"/>
  <!-- Top bar ¥ -->
  <rect x="20" y="28" width="24" height="4"  fill="#7a5c00"/>
  <!-- Stem continue -->
  <rect x="28" y="32" width="8"  height="4"  fill="#7a5c00"/>
  <!-- Bottom bar ¥ -->
  <rect x="20" y="36" width="24" height="4"  fill="#7a5c00"/>
  <!-- Stem to bottom -->
  <rect x="28" y="40" width="8"  height="8"  fill="#7a5c00"/>
</svg>
